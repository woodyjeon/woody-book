services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: woodybook
      POSTGRES_PASSWORD: woodybook
      POSTGRES_DB: woodybook
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woodybook"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
